<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAVECON Black Badge</title>

<style>
body {
	margin: 0;
	background: #000;
	overflow: hidden;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	font-family: monospace;
}

    img {
	    max-width: 90vw;
	    max-height: 90vh;
	    position: relative;
	    z-index: 2;
	    animation: glitch 2s infinite;
    }

    @keyframes glitch {
	    0% { transform: translate(0); }
	    20% { transform: translate(-2px, 1px); }
	    40% { transform: translate(2px, -1px); }
	    60% { transform: translate(-1px, 2px); }
	    80% { transform: translate(1px, -2px); }
	    100% { transform: translate(0); }
    }

    .dna {
	    position: absolute;
	    font-size: 14px;
	    line-height: 14px;
	    opacity: 0;
	    pointer-events: none;
	    white-space: pre;
	    animation: fall linear forwards;
    }

    @keyframes fall {
	    0% {
		    opacity: 0;
		    transform: translateY(-60px);
	    }
	    10% { opacity: 1; }
	    90% { opacity: 1; }
	    100% {
		    opacity: 0;
		    transform: translateY(100vh);
	    }
    }

    /* ?? Antivirus button */
    .antivirus {
	    position: absolute;
	    bottom: 30px;
	    z-index: 3;
	    color: #0f0;
	    text-decoration: none;
	    border: 1px solid #0f0;
	    padding: 10px 16px;
	    font-size: 14px;
	    letter-spacing: 2px;
	    transition: all 0.2s ease;
	    background: rgba(0,0,0,0.6);
    }

    .antivirus:hover {
	    background: #0f0;
	    color: #000;
	    box-shadow: 0 0 10px #0f0;
    }

    #installScreen {
	    position: fixed;
	    inset: 0;
	    background: black;
	    color: #0f0;
	    display: none;
	    justify-content: center;
	    align-items: center;
	    z-index: 10;
	    font-size: 18px;
	    letter-spacing: 2px;
    }

    .install-box {
	    border: 1px solid #0f0;
	    padding: 20px 30px;
	    box-shadow: 0 0 15px #0f0;
	    text-align: center;
    }
</style>
</head>

<body>

<img src="BLACK_BADGE.png" alt="DAVECON Black Badge">

<!-- INSTALL BUTTON -->
<div class="antivirus" onclick="installAntivirus()">
    INSTALL MIND ANTIVIRUS
</div>

<!-- INSTALL OVERLAY -->
<div id="installScreen">
    <div class="install-box">
        <div id="installText">INITIALIZING...</div>
    </div>
</div>

<script>
const chars = ['A', 'T', 'C', 'G'];

function randomBase() {
    return chars[Math.floor(Math.random() * chars.length)];
}

function randomDNAColumn(length) {
    let str = '';
    for (let i = 0; i < length; i++) {
        str += randomBase() + '\n';
    }
    return str;
}

function makeDaveColumn() {
    const pattern = ['D','A','V','E'];
    let str = '';
    for (let i = 0; i < 20; i++) {
        str += pattern[i % 4] + '\n';
    }
    return str;
}

function makeLegitColumn() {
    const word = "TOTALLYLEGIT";
    let arr = [];
    for (let i = 0; i < word.length; i++) {
        arr.push(word[i]);
    }
    return arr.join('\n');
}

function spawnDNA() {
    const el = document.createElement('div');
    el.className = 'dna';

    const roll = Math.random();

    let content;
    let color = '#0f0';

    if (roll < 0.03) {
        content = randomDNAColumn(20);
        color = '#FFD700';
    } else if (roll < 0.08) {
        content = makeDaveColumn();
        color = '#00ffcc';
    } else if (roll < 0.12) {
        content = randomDNAColumn(14);
        setTimeout(() => {
            el.textContent = makeLegitColumn();
        }, 1000 + Math.random() * 1000);
        color = '#ff4444';
    } else {
        content = randomDNAColumn(10 + Math.floor(Math.random() * 20));
    }

    el.textContent = content;
    el.style.color = color;

    el.style.left = Math.random() * window.innerWidth + 'px';
    el.style.top = '-100px';

    const duration = 3 + Math.random() * 4;
    el.style.animationDuration = duration + 's';

    document.body.appendChild(el);

    setTimeout(() => {
        el.remove();
    }, duration * 1000);
}

setInterval(spawnDNA, 180);

function installAntivirus() {
		const screen = document.getElementById('installScreen');
		const text = document.getElementById('installText');

		screen.style.display = 'flex';

		const steps = [
				"INITIALIZING...",
				"SCANNING NEURAL PATHWAYS...",
				"REMOVING INFECTION...",
				"PATCHING DNA...",
				"INSTALL COMPLETE"
			];

		let i = 0;

		const interval = setInterval(() => {
				text.textContent = steps[i];
				i++;

				if (i >= steps.length) {
						clearInterval(interval);

						setTimeout(() => {
								const ts = btoa(Date.now().toString());
								
								window.location.href = `https://dave-tracker.onrender.com/?immune=${ts}`;
								//window.location.href = `http://localhost:3000/?immune=${ts}`;
							}, 500);
					}
			}, 400);
	}
</script>

</body>
</html>
