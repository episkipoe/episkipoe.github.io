<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golf Scorecard</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2430;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --soft: #f5f7fb;
      --accent: #0f766e;
      --accent-soft: #d8f3ee;
      --danger: #b42318;
      --danger-soft: #fee4e2;
      --gold: #996d13;
      --gold-soft: #fff2cc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--soft);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1;
    }

    h2 {
      font-size: 1.15rem;
    }

    h3 {
      font-size: 0.98rem;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    button.danger {
      background: var(--danger);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.28);
      outline-offset: 2px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 12px 32px rgba(31, 41, 55, 0.08);
    }

    #setupPanel,
    #calculatorPanel {
      padding: 18px;
    }

    .setup-top,
    .calculator-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .player-grid,
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    input[type="number"] {
      text-align: center;
    }

    .setup-actions,
    .game-actions,
    .calculator-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    #gamePanel {
      display: none;
    }

    body.game-active #setupPanel {
      display: none;
    }

    body.game-active #gamePanel {
      display: block;
    }

    .game-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 360px);
      gap: 16px;
      align-items: start;
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .status-card {
      padding: 14px;
      border-right: 1px solid var(--line);
    }

    .status-card:last-child {
      border-right: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-value {
      margin-top: 4px;
      font-size: clamp(1.35rem, 3vw, 2.15rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .game-actions {
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .table-wrapper {
      max-height: 70vh;
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px;
      text-align: center;
      vertical-align: middle;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #eef3f8;
      font-size: 0.88rem;
    }

    tbody tr.current-hole td {
      background: var(--accent-soft);
    }

    tbody tr.complete-hole td:first-child {
      color: var(--accent);
      font-weight: 800;
    }

    tbody td:first-child,
    thead th:first-child,
    tfoot td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #fff;
      font-weight: 800;
    }

    thead th:first-child {
      z-index: 4;
      background: #eef3f8;
    }

    tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #fff;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .hole-label {
      display: grid;
      gap: 2px;
      min-width: 84px;
    }

    .dealer-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 28px;
      border-radius: 8px;
      padding: 3px 7px;
      font-weight: 800;
    }

    .dealer-pill {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .score-input {
      max-width: 72px;
      margin: 0 auto;
    }

    .leader {
      background: var(--accent-soft) !important;
      color: #0b5f59;
    }

    .trailer {
      background: var(--danger-soft) !important;
      color: var(--danger);
    }

    .calculator-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .card-select {
      min-height: 58px;
      border-color: #c9d3df;
      font-weight: 800;
      text-align: center;
    }

    .column-clear {
      background: var(--accent-soft);
      border-color: #9fd8ce;
    }

    .calculator-result {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      margin-bottom: 14px;
    }

    .calculator-total {
      font-size: 2.25rem;
      font-weight: 900;
      line-height: 1;
    }

    .score-rules {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .rule-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .rule-value {
      color: var(--ink);
      font-weight: 800;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 920px) {
      .game-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      main {
        width: min(100vw - 8px, 1120px);
        padding: 8px 0;
      }

      header {
        display: block;
      }

      header .setup-actions {
        margin-top: 14px;
      }

      .status-bar {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .status-card {
        padding: 10px 8px;
        border-right: 1px solid var(--line);
        border-bottom: 0;
        min-width: 0;
      }

      .status-card:last-child {
        border-right: 0;
      }

      .eyebrow {
        font-size: 0.66rem;
      }

      .status-value {
        font-size: 1.05rem;
        overflow-wrap: anywhere;
      }

      .game-actions {
        padding: 8px;
      }

      .setup-actions,
      .game-actions,
      .calculator-actions {
        gap: 6px;
      }

      button {
        min-height: 36px;
        padding: 0 10px;
        font-size: 0.88rem;
      }

      th,
      td {
        padding: 5px;
        font-size: 0.82rem;
      }

      table {
        min-width: 390px;
      }

      input,
      select {
        min-height: 36px;
        padding: 6px 7px;
        font-size: 0.9rem;
      }

      .score-input {
        max-width: 54px;
        padding-left: 4px;
        padding-right: 4px;
      }

      .dealer-pill {
        min-width: 34px;
        min-height: 24px;
        padding: 2px 5px;
        font-size: 0.76rem;
      }

      .calculator-grid {
        gap: 6px;
      }

      .card-select {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
    </header>

    <section id="setupPanel" class="panel" aria-labelledby="setupTitle">
      <div class="setup-top">
        <h2 id="setupTitle">Players</h2>
        <button class="secondary" type="button" onclick="addPlayer()">Add Player</button>
      </div>
      <div id="playerFields" class="player-grid"></div>
      <div class="settings-grid">
        <label>
          Holes
          <input id="holeCount" type="number" min="1" max="36" value="9">
        </label>
        <label>
          Starting Dealer
          <select id="startingDealer"></select>
        </label>
        <label>
          Game Type
          <select id="gameType">
            <option value="6-card">6-card golf</option>
            <option value="4-card">4-card golf</option>
            <option value="custom">Custom scoring</option>
          </select>
        </label>
      </div>
      <div class="setup-actions">
        <button type="button" onclick="startNewGame()">New Game</button>
        <button class="secondary" type="button" onclick="removePlayer()">Remove Player</button>
      </div>
    </section>

    <div id="gamePanel" class="game-grid">
      <section class="panel" aria-label="Golf score table">
        <div class="status-bar">
          <div class="status-card">
            <div class="eyebrow">Current Hole</div>
            <div id="currentHole" class="status-value">1</div>
          </div>
          <div class="status-card">
            <div class="eyebrow">Leader</div>
            <div id="currentLeader" class="status-value">Player 1</div>
          </div>
          <div class="status-card">
            <div class="eyebrow">Dealer</div>
            <div id="currentDealer" class="status-value">Player 1</div>
          </div>
        </div>

        <div class="game-actions">
          <div class="setup-actions">
            <button type="button" onclick="jumpToCurrentHole()">Current Hole</button>
            <button class="secondary" type="button" onclick="showSetup()">Edit Players</button>
            <button class="secondary" type="button" onclick="addHoles(9)">Add 9 Holes</button>
          </div>
          <button class="danger" type="button" onclick="clearGame()">Clear Game</button>
        </div>

        <div class="table-wrapper">
          <table id="scoreTable"></table>
        </div>
      </section>

      <aside id="calculatorPanel" class="panel" aria-labelledby="calculatorTitle">
        <div class="calculator-top">
          <h2 id="calculatorTitle">Hand Calculator</h2>
          <button class="secondary" type="button" onclick="clearCalculator()">Clear</button>
        </div>
        <div id="calculatorGrid" class="calculator-grid"></div>
        <div class="calculator-result">
          <div>
            <div class="eyebrow">Hand Score</div>
            <div id="calculatorNote" class="subtitle">Columns with matching cards count as 0.</div>
          </div>
          <div id="handTotal" class="calculator-total">0</div>
        </div>
        <div class="calculator-actions">
          <button type="button" onclick="copyHandScore()">Use Score</button>
          <button class="secondary" type="button" onclick="toggleCalculatorMode()">Switch Layout</button>
        </div>
        <div class="score-rules" aria-label="Golf card values">
          <div class="rule-row"><span>Ace</span><span class="rule-value">1</span></div>
          <div class="rule-row"><span>2 through 10</span><span class="rule-value">Face value</span></div>
          <div class="rule-row"><span>Jack and Queen</span><span class="rule-value">10</span></div>
          <div class="rule-row"><span>King</span><span class="rule-value">0</span></div>
          <div class="rule-row"><span>Joker</span><span class="rule-value">-5</span></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const storageKey = 'golfCardGameScorecard';
    const cardOptions = [
      { label: '-', value: '' },
      { label: 'Joker', value: -5 },
      { label: 'K', value: 0 },
      { label: 'A', value: 1 },
      { label: '2', value: 2 },
      { label: '3', value: 3 },
      { label: '4', value: 4 },
      { label: '5', value: 5 },
      { label: '6', value: 6 },
      { label: '7', value: 7 },
      { label: '8', value: 8 },
      { label: '9', value: 9 },
      { label: '10', value: 10 },
      { label: 'J', value: 10 },
      { label: 'Q', value: 10 }
    ];

    let players = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
    let scores = {};
    let holeCount = 9;
    let startingDealer = 0;
    let gameType = '6-card';
    let calculatorSlots = Array(6).fill('');
    let activeScoreInputId = '';

    function renderPlayerFields() {
      const fields = document.getElementById('playerFields');
      fields.innerHTML = players.map((name, index) => `
        <label>
          Player ${index + 1}
          <input id="player_${index}" type="text" value="${escapeHtml(name)}" placeholder="Player ${index + 1}" oninput="renderDealerOptions()">
        </label>
      `).join('');
      renderDealerOptions();
    }

    function renderDealerOptions() {
      const dealerSelect = document.getElementById('startingDealer');
      if (!dealerSelect) return;
      const names = readPlayerNames();
      dealerSelect.innerHTML = names.map((name, index) => `
        <option value="${index}" ${index === startingDealer ? 'selected' : ''}>${escapeHtml(name)}</option>
      `).join('');
    }

    function addPlayer() {
      players = readPlayerNames();
      players.push(`Player ${players.length + 1}`);
      renderPlayerFields();
      document.getElementById(`player_${players.length - 1}`).focus();
    }

    function removePlayer() {
      players = readPlayerNames();
      if (players.length <= 2) return;
      players.pop();
      startingDealer = Math.min(startingDealer, players.length - 1);
      renderPlayerFields();
    }

    function readPlayerNames() {
      return Array.from(document.querySelectorAll('#playerFields input'))
        .map((input, index) => input.value.trim() || `Player ${index + 1}`);
    }

    function startNewGame() {
      players = readPlayerNames();
      holeCount = clampNumber(document.getElementById('holeCount').value, 1, 36, 9);
      startingDealer = clampNumber(document.getElementById('startingDealer').value, 0, players.length - 1, 0);
      gameType = document.getElementById('gameType').value;
      scores = {};
      calculatorSlots = Array(getCalculatorSlotCount()).fill('');
      document.body.classList.add('game-active');
      renderTable();
      renderCalculator();
      saveGame();
      jumpToCurrentHole();
    }

    function showSetup() {
      renderPlayerFields();
      document.getElementById('holeCount').value = holeCount;
      document.getElementById('gameType').value = gameType;
      document.body.classList.remove('game-active');
      saveGame();
    }

    function clearGame() {
      localStorage.removeItem(storageKey);
      players = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
      scores = {};
      holeCount = 9;
      startingDealer = 0;
      gameType = '6-card';
      calculatorSlots = Array(6).fill('');
      document.body.classList.remove('game-active');
      renderPlayerFields();
      document.getElementById('holeCount').value = holeCount;
      document.getElementById('gameType').value = gameType;
    }

    function renderTable() {
      const table = document.getElementById('scoreTable');
      const currentHole = getCurrentHoleIndex();
      let html = '<thead><tr><th>Dealer</th>';

      players.forEach(player => {
        html += `<th>${escapeHtml(player)}</th>`;
      });
      html += '</tr></thead><tbody>';

      for (let holeIndex = 0; holeIndex < holeCount; holeIndex++) {
        const rowClass = holeIndex === currentHole ? 'current-hole' : isHoleComplete(holeIndex) ? 'complete-hole' : '';
        html += `<tr id="hole_${holeIndex}" class="${rowClass}">`;
        html += `<td><span class="dealer-pill">${escapeHtml(getDealer(holeIndex))}</span></td>`;

        players.forEach((player, playerIndex) => {
          const key = scoreKey(holeIndex, playerIndex);
          const value = scores[key] ?? '';
          html += `<td><input class="score-input" id="${key}" type="number" inputmode="numeric" value="${value}" onfocus="activeScoreInputId = this.id" onchange="updateScore(${holeIndex}, ${playerIndex}, this.value)"></td>`;
        });

        html += '</tr>';
      }

      html += '</tbody><tfoot>';
      html += '<tr><td>Total</td>';
      getTotals().forEach((total, index) => {
        html += `<td id="total_${index}">${total}</td>`;
      });
      html += '</tr></tfoot>';
      table.innerHTML = html;

      updateStatusCards(currentHole);
      highlightTotals();
    }

    function updateScore(holeIndex, playerIndex, rawValue) {
      const key = scoreKey(holeIndex, playerIndex);
      const value = rawValue === '' ? '' : Number(rawValue);

      if (value === '' || Number.isNaN(value)) {
        delete scores[key];
      } else {
        scores[key] = value;
      }

      renderTable();
      saveGame();
    }

    function addHoles(count) {
      holeCount = Math.min(36, holeCount + count);
      renderTable();
      saveGame();
    }

    function getTotals() {
      return players.map((player, playerIndex) => {
        let total = 0;
        for (let holeIndex = 0; holeIndex < holeCount; holeIndex++) {
          total += scores[scoreKey(holeIndex, playerIndex)] || 0;
        }
        return total;
      });
    }

    function highlightTotals() {
      const totals = getTotals();
      const best = Math.min(...totals);
      const worst = Math.max(...totals);
      totals.forEach((total, index) => {
        const cell = document.getElementById(`total_${index}`);
        if (!cell) return;
        if (total === best) cell.classList.add('leader');
        if (total === worst && worst !== best) cell.classList.add('trailer');
      });
    }

    function getCurrentHoleIndex() {
      const firstIncomplete = Array.from({ length: holeCount }, (item, index) => index)
        .find(holeIndex => !isHoleComplete(holeIndex));
      return firstIncomplete === undefined ? holeCount - 1 : firstIncomplete;
    }

    function isHoleComplete(holeIndex) {
      return players.every((player, playerIndex) => scores[scoreKey(holeIndex, playerIndex)] !== undefined);
    }

    function updateStatusCards(holeIndex) {
      const complete = Array.from({ length: holeCount }, (item, index) => index).every(isHoleComplete);
      document.getElementById('currentHole').textContent = complete ? 'Game over' : String(holeIndex + 1);
      document.getElementById('currentLeader').textContent = getLeaderText();
      document.getElementById('currentDealer').textContent = complete ? 'Done' : getDealer(holeIndex);
    }

    function getLeaderText() {
      const totals = getTotals();
      const best = Math.min(...totals);
      return players.filter((player, index) => totals[index] === best).join(', ');
    }

    function getDealer(holeIndex) {
      return players[(startingDealer + holeIndex) % players.length];
    }

    function scoreKey(holeIndex, playerIndex) {
      return `score_${holeIndex}_${playerIndex}`;
    }

    function gameTypeLabel() {
      if (gameType === '4-card') return '4 cards';
      if (gameType === '6-card') return '6 cards';
      return 'custom';
    }

    function jumpToCurrentHole() {
      const row = document.getElementById(`hole_${getCurrentHoleIndex()}`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
    }

    function getCalculatorSlotCount() {
      return gameType === '4-card' ? 4 : 6;
    }

    function renderCalculator() {
      const grid = document.getElementById('calculatorGrid');
      const slotCount = getCalculatorSlotCount();
      calculatorSlots = calculatorSlots.slice(0, slotCount);
      while (calculatorSlots.length < slotCount) calculatorSlots.push('');

      grid.innerHTML = calculatorSlots.map((value, index) => `
        <select class="card-select" id="card_${index}" onchange="updateCalculatorSlot(${index}, this.value)">
          ${cardOptions.map(option => `
            <option value="${option.value}" ${String(option.value) === String(value) ? 'selected' : ''}>${option.label}</option>
          `).join('')}
        </select>
      `).join('');
      grid.style.gridTemplateColumns = `repeat(${slotCount / 2}, minmax(0, 1fr))`;
      updateHandTotal();
    }

    function updateCalculatorSlot(index, value) {
      calculatorSlots[index] = value === '' ? '' : Number(value);
      updateHandTotal();
      saveGame();
    }

    function updateHandTotal() {
      let total = 0;
      const columns = getCalculatorSlotCount() / 2;
      const selects = Array.from(document.querySelectorAll('.card-select'));

      selects.forEach(select => select.classList.remove('column-clear'));
      for (let column = 0; column < columns; column++) {
        const topIndex = column;
        const bottomIndex = column + columns;
        const topValue = calculatorSlots[topIndex];
        const bottomValue = calculatorSlots[bottomIndex];
        const isMatched = topValue !== '' && bottomValue !== '' && Number(topValue) === Number(bottomValue);

        if (isMatched) {
          selects[topIndex]?.classList.add('column-clear');
          selects[bottomIndex]?.classList.add('column-clear');
        } else {
          total += Number(topValue || 0) + Number(bottomValue || 0);
        }
      }

      document.getElementById('handTotal').textContent = total;
    }

    function copyHandScore() {
      const total = document.getElementById('handTotal').textContent;
      const input = document.getElementById(activeScoreInputId) || document.querySelector('.current-hole .score-input');
      if (!input) return;
      input.value = total;
      input.dispatchEvent(new Event('change'));
    }

    function clearCalculator() {
      calculatorSlots = Array(getCalculatorSlotCount()).fill('');
      renderCalculator();
      saveGame();
    }

    function toggleCalculatorMode() {
      gameType = gameType === '6-card' ? '4-card' : '6-card';
      calculatorSlots = Array(getCalculatorSlotCount()).fill('');
      renderTable();
      renderCalculator();
      saveGame();
    }

    function saveGame() {
      localStorage.setItem(storageKey, JSON.stringify({
        players,
        scores,
        holeCount,
        startingDealer,
        gameType,
        calculatorSlots,
        active: document.body.classList.contains('game-active')
      }));
    }

    function loadGame() {
      const data = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (data) {
        players = Array.isArray(data.players) && data.players.length >= 2 ? data.players : players;
        scores = data.scores || {};
        holeCount = clampNumber(data.holeCount, 1, 36, 9);
        startingDealer = clampNumber(data.startingDealer, 0, players.length - 1, 0);
        gameType = data.gameType || gameType;
        calculatorSlots = Array.isArray(data.calculatorSlots) ? data.calculatorSlots : calculatorSlots;
        document.body.classList.toggle('game-active', !!data.active);
      }

      renderPlayerFields();
      document.getElementById('holeCount').value = holeCount;
      document.getElementById('gameType').value = gameType;
      if (document.body.classList.contains('game-active')) renderTable();
      renderCalculator();
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (Number.isNaN(number)) return fallback;
      return Math.min(max, Math.max(min, Math.floor(number)));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    window.addEventListener('load', loadGame);
  </script>
</body>
</html>
